[alembic]
script_location = alembic
prepend_sys_path = .

# Alembic reads the DB URL primarily from `app.core.config` in `alembic/env.py`.
# This value is a fallback for tooling that inspects `alembic.ini`.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/robe

[loggers]
keys = root,sqlalchemy,alembic
qualname = alembic
level = INFO

[handlers]
keys = console
qualname = console
class = StreamHandler
args = (sys.stderr,)

[formatters]
keys = generic
qualname = generic
class = %(levelname)s

[logger_root]
level = INFO
handlers = console

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

