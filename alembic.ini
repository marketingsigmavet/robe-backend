[alembic]
script_location = alembic
prepend_sys_path = .

# Alembic reads the DB URL primarily from `app.core.config` in `alembic/env.py`.
# This value is a fallback for tooling that inspects `alembic.ini`.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/robe

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

