$kind: http-request
name: Update Category
method: PATCH
url: '{{base_url}}/admin/product-categories/{{category_id}}'
headers:
- key: Authorization
  value: Bearer {{access_token}}
- key: Content-Type
  value: application/json
body:
  type: json
  content: "{\n  \"description\": \"Updated Category Info\"\n}"
