$kind: http-request
name: Archive Session
method: PATCH
url: '{{base_url}}/history/sessions/:id/archive'
order: 2000
pathVariables:
  - key: id
    value: '{{session_id}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response indicates archive status", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("object");
      });
