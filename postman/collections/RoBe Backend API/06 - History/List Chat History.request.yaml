$kind: http-request
name: List Chat History
method: GET
url: '{{base_url}}/history/sessions'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is an array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("array");
      });

      // Store first session ID if available for archive test
      const jsonData = pm.response.json();
      if (jsonData.length > 0 && jsonData[0].id) {
          pm.collectionVariables.set("session_id", jsonData[0].id);
          console.log("Stored session_id from history:", jsonData[0].id);
      }
