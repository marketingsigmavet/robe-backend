$kind: http-request
name: Send Message
method: POST
url: '{{base_url}}/chat/sessions/{{session_id}}/messages'
headers:
- key: Authorization
  value: Bearer {{access_token}}
- key: Content-Type
  value: application/json
body:
  type: json
  content: "{\n  \"message_text\": \"Hi there, what should I feed my new kitten?\"\
    \n}"
