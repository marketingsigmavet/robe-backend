$kind: http-request
name: Create Species
method: POST
url: '{{base_url}}/admin/species'
headers:
- key: Authorization
  value: Bearer {{access_token}}
- key: Content-Type
  value: application/json
body:
  type: json
  content: "{\n  \"species_name\": \"Cat\",\n  \"description\": \"Feline species\"\
    \n}"
