$kind: http-request
name: Create Pet
method: POST
url: "{{base_url}}/pets/"
order: 2000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "pet_name": "Buddy",
      "species_id": "ad54d9ea-d825-492d-aa92-7089c34dac68",
      "breed_id": "9d9d1449-cd6d-4ff5-916e-ad45f8992c89",
      "age_years": 3,
      "weight_kg": 30
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("Response has pet data", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("object");
      });

      pm.test("Pet has ID", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
      });

      // Store created pet ID
      if (pm.response.code === 200 || pm.response.code === 201) {
          const jsonData = pm.response.json();
          if (jsonData.id) {
              pm.collectionVariables.set("pet_id", jsonData.id);
              console.log("Created pet_id:", jsonData.id);
          }
      }
    language: text/javascript
