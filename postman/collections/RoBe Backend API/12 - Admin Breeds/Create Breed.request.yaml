$kind: http-request
name: Create Breed
method: POST
url: "{{base_url}}/admin/breeds"
headers:
  Authorization: Bearer {{access_token}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "species_id": "{{species_id}}",
      "breed_name": "Labrador Retriever",
      "breed_notes": "The Labrador Retriever, also known simply as the Labrador or Lab, is a British breed of retriever gun dog."
    }
